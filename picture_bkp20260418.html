{% load cms_tags sekizai_tags thumbnail %}

{% if picture_link %}
<a href="{{ picture_link }}"
   {% if instance.link_target %} target="{{ instance.link_target }}"{% endif %}
   {{ instance.link_attributes_str }}>
{% endif %}

{% if instance.caption_text %}
<figure class="cms-picture-figure">
{% endif %}

{% if instance.picture %}
    {% thumbnail instance.picture "576x0" as small %}
    {% thumbnail instance.picture "992x0" as medium %}
    {% thumbnail instance.picture "1600x0" as large %}

    <div class="cms-picture-background"
         style="width:100%; min-height:400px; position:relative; background-image:url('{{ small.url }}');"
         data-bg-medium="{{ medium.url }}"
         data-bg-large="{{ large.url }}"
         {% if instance.attributes_str %}{{ instance.attributes_str }}{% endif %}>
        <div class="cms-picture-overlay"></div>
        <div class="cms-picture-content">
            {% for plugin in instance.child_plugin_instances %}
                {% comment %}
                Skip standalone PicturePlugins to avoid rendering stray <img> tags
                but allow Card plugins with nested images
                {% endcomment %}
                {% if plugin.plugin_type != "PicturePlugin" %}
                    {% render_plugin plugin %}
                {% endif %}
            {% endfor %}
        </div>
    </div>
{% else %}
    <div class="cms-picture-background"
         style="width:100%; min-height:400px; position:relative;"
         {% if instance.attributes_str %}{{ instance.attributes_str }}{% endif %}>
        <div class="cms-picture-overlay"></div>
        <div class="cms-picture-content">
            {% for plugin in instance.child_plugin_instances %}
                {% render_plugin plugin %}
            {% endfor %}
        </div>
    </div>
{% endif %}

{% if instance.caption_text %}
    <figcaption>{{ instance.caption_text }}</figcaption>
</figure>
{% endif %}

{% if picture_link %}
</a>
{% endif %}

{# Responsive JS for switching background images #}
<script>
document.addEventListener("DOMContentLoaded", function() {
    const bg = document.querySelector('.cms-picture-background');
    if (!bg) return;

    const width = window.innerWidth;

    if(width >= 993 && bg.dataset.bgLarge) {
        bg.style.backgroundImage = `url(${bg.dataset.bgLarge})`;
    } else if(width >= 577 && bg.dataset.bgMedium) {
        bg.style.backgroundImage = `url(${bg.dataset.bgMedium})`;
    } else {
        // Already set to small by default
    }

    // Optional: update on resize
    window.addEventListener('resize', function() {
        const w = window.innerWidth;
        if(w >= 993 && bg.dataset.bgLarge) {
            bg.style.backgroundImage = `url(${bg.dataset.bgLarge})`;
        } else if(w >= 577 && bg.dataset.bgMedium) {
            bg.style.backgroundImage = `url(${bg.dataset.bgMedium})`;
        } else if(bg.dataset.bgSmall) {
            bg.style.backgroundImage = `url(${bg.dataset.bgSmall})`;
        }
    });
});
</script>
